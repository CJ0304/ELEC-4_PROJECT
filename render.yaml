databases:
  - name: servisense-db
    plan: free
    databaseName: servisense

services:
  - type: web
    name: servisense
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.headless true --server.address 0.0.0.0
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: servisense-db
          property: connectionString
